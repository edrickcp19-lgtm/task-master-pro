<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Task Master</h1>
    </header>

    <div class="container">
        <aside>
            <nav>
                <ul>
                    <li><a href="#">Hoy</a></li>
                    <li><a href="#">Pendientes</a></li>
                    <li><a href="#">Completadas</a></li>
                </ul>
            </nav>
        </aside>

        <main>
            <section class="task-form-container">
                <form id="task-form">
                    <input type="text" id="task-input" placeholder="¿Qué tienes pendiente?" required>
                    <button type="submit">Añadir</button>
                </form>
            </section>

            <section class="task-list">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2>Mis Tareas</h2>
                    <span id="task-count" class="badge priority-medium">0 Tareas</span>
                </div>
                
                <div id="task-container">
                    </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
