<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen">
    
    <header class="bg-indigo-600 dark:bg-indigo-800 p-4 text-center text-white shadow-md">
        <h1 class="text-2xl font-bold tracking-tight">TaskFlow Pro</h1>
    </header>

    <div class="container mx-auto flex flex-col md:flex-row max-w-6xl p-6 gap-6">
        <aside class="w-full md:w-1/4 bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm h-fit border border-slate-200 dark:border-slate-700">
            <nav>
                <ul class="space-y-3 font-medium">
                    <li><a href="#" class="block p-2 hover:bg-indigo-50 dark:hover:bg-slate-700 rounded-lg text-indigo-600 dark:text-indigo-400">Hoy</a></li>
                    <li><a href="#" class="block p-2 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg">Pendientes</a></li>
                    <li class="pt-4 border-t border-slate-100 dark:border-slate-700">
                        <button id="theme-toggle" class="w-full py-2 px-4 bg-slate-100 dark:bg-slate-700 rounded-lg flex items-center justify-center gap-2 hover:ring-2 ring-indigo-500 transition-all text-sm">
                            <span class="dark:hidden">🌙 Modo Oscuro</span>
                            <span class="hidden dark:inline">☀️ Modo Claro</span>
                        </button>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="flex-1">
            <section class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm mb-6 border border-slate-200 dark:border-slate-700">
                <form id="task-form" class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="task-input" placeholder="¿Qué tienes pendiente?" required 
                           class="flex-1 p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg font-semibold transition-all shadow-lg active:scale-95">
                        Añadir
                    </button>
                </form>
            </section>

            <section class="task-list">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">Mis Tareas</h2>
                    <span id="task-count" class="bg-indigo-100 text-indigo-700 dark:bg-indigo-900/40 dark:text-indigo-300 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">
                        0 Tareas
                    </span>
                </div>
                
                <div id="task-container" class="space-y-4">
                    </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
